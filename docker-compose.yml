# Sentinel AI — single-command stack
# Run:  .\run-all.ps1   (Windows)  or  ./start.sh   (Linux/macOS)
#       docker compose up --build -d --wait

name: sentinel

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret}
      POSTGRES_DB: sentinel_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    <<: *restart
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    <<: *restart
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep mosquitto || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    <<: *restart
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD:-sentinel_secret}@postgres:5432/sentinel_ai
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER: mqtt://mqtt:1883
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand}
      EDGE_AI_URL: http://edge-ai:8001
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - evidence_data:/app/data/evidence
      - baseline_data:/app/data/baselines
      - ./data:/app/data/host-network:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  edge-ai:
    build: ./edge-ai
    <<: *restart
    environment:
      BACKEND_URL: http://backend:8000
      MQTT_BROKER: mqtt://mqtt:1883
      MODEL_CACHE: /app/models
    volumes:
      - evidence_data:/app/data/evidence
      - baseline_data:/app/data/baselines
      - model_cache:/app/models
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  frontend:
    build: ./frontend
    <<: *restart
    ports:
      - "0.0.0.0:${SENTINEL_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  evidence_data:
  baseline_data:
  model_cache:
